<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Productivity Database - Full Suite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f4f7f6; }

        /* --- LOGIN SCREEN --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1600');
            background-size: cover; display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        #loginBtn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- MAIN APP --- */
        #mainApp { display: none; padding: 20px; }
        .header-title { text-align: center; color: #1a73e8; margin-top: 100px; text-transform: uppercase; font-size: 20px; }

        /* NAV BUTTONS */
        .btn {
            position: fixed; z-index: 5000; padding: 10px 18px; border-radius: 50px; 
            border: none; color: white; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 140px; font-size: 11px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        #btnStore { top: 20px; left: 20px; background-color: #1a73e8; }
        #btnSubmit { top: 75px; left: 20px; background-color: #2e7d32; }

        /* TOP RIGHT UPLOAD SECTION */
        .upload-container {
            position: fixed; top: 20px; right: 20px; z-index: 5000;
            display: flex; align-items: center; gap: 10px; background: white;
            padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .upload-container input[type="file"] { font-size: 11px; width: 180px; }
        #btnUpload { background-color: #f57c00; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; }

        /* MAIN TABLE STYLES */
        .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: auto; max-height: 75vh; margin-top: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 2100px; }
        th { background: #1a73e8; color: white; position: sticky; top: 0; padding: 10px; z-index: 10; font-size: 10px; border-right: 1px solid #4da3ff; text-transform: uppercase; }
        
        .sticky-date { position: sticky; left: 0; background: #1a73e8 !important; z-index: 11; width: 100px; }
        .sticky-name { 
            position: sticky; left: 100px; background: black !important; 
            color: white !important; z-index: 9; border-right: 2px solid #1a73e8; 
            font-weight: bold; text-align: center; padding: 10px; 
        }
        
        td { border-bottom: 1px solid #eee; border-right: 1px solid #eee; padding: 5px; text-align: center; font-size: 11px; }
        input.cell { width: 45px; text-align: center; border: 1px solid #ccc; border-radius: 4px; padding: 3px; }
        input.date-cell { width: 85px; border: none; background: transparent; color: white; font-weight: bold; text-align: center; font-size: 10px; }
        .total-col { font-weight: bold; background: #e8f5e9; color: #2e7d32; width: 60px; }
        .avg-col { font-weight: bold; background: #fffde7; color: #f57f17; width: 60px; }

        /* TARGET BLOCK (ANALYSIS VIEW) */
        #targetBlock { display: none; padding: 30px; margin-top: 100px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .coder-sheet { margin-bottom: 40px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .coder-header { background: #333; color: white; padding: 10px; font-weight: bold; }

        /* --- DATA STORE MODAL (RESTORED) --- */
        #storeModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; flex-direction: column; padding: 20px; overflow: auto; }
        .modal-header-btns { position: sticky; top: 0; background: white; padding: 10px; display: flex; justify-content: flex-end; gap: 10px; z-index: 100; border-bottom: 2px solid #1a73e8; }
        .m-btn { padding: 10px 20px; border-radius: 5px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 12px; }
        .close-btn { background: #d32f2f; }
        .print-btn { background: #455a64; }
        .down-btn { background: #f57c00; }
        
        .stored-table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 2100px; }
        .stored-table th { background: #333; color: white; padding: 8px; font-size: 10px; border: 1px solid #555; }
        .stored-table td { border: 1px solid #ddd; padding: 6px; text-align: center; font-size: 10px; white-space: nowrap; }

        @media print { .no-print { display: none !important; } #storeModal { position: static; display: block; overflow: visible; } }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="color:#1a73e8">OFFICE LOGIN</h2>
            <input type="text" id="user" placeholder="Username (praveen)">
            <input type="password" id="pass" placeholder="Password (1234)">
            <button id="loginBtn" onclick="doLogin()">SUBMIT</button>
            <p id="err" style="color:red; display:none; font-size:12px; margin-top:10px;">Invalid Credentials</p>
        </div>
    </div>

    <div id="mainApp">
        <button id="btnStore" class="btn" onclick="openStore()">💾 DATA STORE</button>
        <button id="btnSubmit" class="btn" onclick="validateAndSubmit()">📤 SUBMIT DATA</button>

        <div class="upload-container">
            <input type="file" id="fileInput" accept=".csv, .xlsx, .xls">
            <button id="btnUpload" onclick="handleFileUpload()">☁️ UPLOAD</button>
        </div>

        <div id="inputSection">
            <h2 class="header-title">Productivity Input Sheet</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="sticky-date">DATE</th>
                            <th class="sticky-name">NAME</th>
                            <th>EMP ID</th><th>SPECIALITY</th><th>MANAGER</th>
                            <th>8-9</th><th>9-10</th><th>10-11</th><th>11-12</th>
                            <th style="background:#444">12-1</th>
                            <th>1-2</th><th>2-3</th><th>3-4</th><th>4-5</th><th>5-6</th>
                            <th class="total-col">TOTAL</th><th class="avg-col">AVG</th>
                        </tr>
                    </thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>

        <div id="targetBlock">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #1a73e8;">📊 CODER ANALYSIS REPORT</h2>
                <button class="m-btn" style="background:#d32f2f" onclick="resetView()">CLOSE</button>
            </div>
            <div id="analysisResults"></div>
        </div>
    </div>

    <div id="storeModal">
        <div class="modal-header-btns no-print">
            <button class="m-btn down-btn" onclick="downloadCSV()">📥 DOWNLOAD CSV</button>
            <button class="m-btn print-btn" onclick="window.print()">🖨️ PRINT REPORT</button>
            <button class="m-btn close-btn" onclick="closeStore()">✖ CLOSE</button>
        </div>
        <h2 style="color: #1a73e8; padding-left: 10px;">📊 FULL ARCHIVED PRODUCTIVITY LOGS</h2>
        <div id="storeContent" style="overflow-x: auto; padding: 10px;"></div>
    </div>

<script>
    const employees = [
        {id: "83890", name: "Vishnupriya Govindaswamy", spec: "Medical Coding", mgr: "Dilip Kumar"},
        {id: "84470", name: "Kavin J", spec: "Billing", mgr: "Dilip Kumar"},
        {id: "83948", name: "Bhuvaneshwari S", spec: "AR Followup", mgr: "Dilip Kumar"},
        {id: "83896", name: "Ajith G K", spec: "Denial Mgmt", mgr: "Dilip Kumar"},
        {id: "84308", name: "Tasleem Ali", spec: "Medical Coding", mgr: "Dilip Kumar"},
        {id: "83881", name: "Ajith kumar", spec: "Billing", mgr: "Dilip Kumar"},
        {id: "84115", name: "Thiyagarajan Mahendran", spec: "AR Followup", mgr: "Dilip Kumar"},
        {id: "83969", name: "Paresh Sukhwani", spec: "Denial Mgmt", mgr: "Dilip Kumar"},
        {id: "84207", name: "Chennarapu Pavan", spec: "Medical Coding", mgr: "Dilip Kumar"},
        {id: "84316", name: "Kathiresan K", spec: "Billing", mgr: "Dilip Kumar"},
        {id: "82712", name: "Anagha Sreevalsan", spec: "AR Followup", mgr: "Dilip Kumar"},
        {id: "82539", name: "Santosh Shinde", spec: "Denial Mgmt", mgr: "Dilip Kumar"},
        {id: "82554", name: "Priyanka Vyewahare", spec: "Medical Coding", mgr: "Dilip Kumar"},
        {id: "83476", name: "Nikita Gurav", spec: "Billing", mgr: "Dilip Kumar"},
        {id: "83000", name: "Ponmani Manickam", spec: "AR Followup", mgr: "Dilip Kumar"}
    ];

    let database = [];

    function doLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'praveen' && p === '1234') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            renderTable();
        } else { document.getElementById('err').style.display = 'block'; }
    }

    // Enter key for login
    document.getElementById('pass').addEventListener('keydown', (e) => { if(e.key === 'Enter') doLogin(); });

    function renderTable() {
        const tb = document.getElementById('tBody');
        tb.innerHTML = '';
        employees.forEach((e, i) => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td class="sticky-date"><input type="text" class="date-cell date-${i}" value="23/02/2026"></td>
                <td class="sticky-name">${e.name}</td>
                <td>${e.id}</td><td>${e.spec}</td><td>${e.mgr}</td>
                ${Array(4).fill(0).map(() => `<td><input type="number" class="cell in-${i}"></td>`).join('')}
                <td style="background:#eee; font-size:9px;">BREAK</td>
                ${Array(5).fill(0).map(() => `<td><input type="number" class="cell in-${i}"></td>`).join('')}
                <td class="total-col" id="tot-${i}">0</td>
                <td class="avg-col" id="avg-${i}">0.00</td>
            `;
            tb.appendChild(row);
        });

        document.querySelectorAll('.cell').forEach(inp => {
            inp.addEventListener('input', function() {
                let idx = this.className.split('in-')[1];
                let s = 0;
                document.querySelectorAll(`.in-${idx}`).forEach(x => s += Number(x.value) || 0);
                document.getElementById(`tot-${idx}`).innerText = s;
                document.getElementById(`avg-${idx}`).innerText = (s / 9).toFixed(2);
            });
        });
    }

    function handleFileUpload() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) return alert("Please select a file.");
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            if (jsonData.length === 0) return alert("File is empty.");
            const required = ["Specialty", "Coder Name", "Account Number", "MRN", "DOU"];
            const missing = required.filter(h => !Object.keys(jsonData[0]).includes(h));
            if (missing.length > 0) return alert("Missing: " + missing.join(", "));
            const grouped = jsonData.reduce((acc, obj) => {
                const key = obj["Coder Name"] || "Unknown";
                if (!acc[key]) acc[key] = [];
                acc[key].push(obj);
                return acc;
            }, {});
            displayAnalysis(grouped);
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    function displayAnalysis(grouped) {
        const res = document.getElementById('analysisResults');
        res.innerHTML = '';
        for (const coder in grouped) {
            let html = `<div class="coder-sheet"><div class="coder-header">${coder} (Total: ${grouped[coder].length})</div><table style="min-width:100%"><thead>
                <tr><th>Specialty</th><th>Account Number</th><th>MRN</th><th>DOU</th></tr></thead><tbody>`;
            grouped[coder].forEach(r => {
                html += `<tr><td>${r.Specialty}</td><td>${r["Account Number"]}</td><td>${r.MRN}</td><td>${r.DOU}</td></tr>`;
            });
            res.innerHTML += html + `</tbody></table></div>`;
        }
        document.getElementById('inputSection').style.display = 'none';
        document.getElementById('targetBlock').style.display = 'block';
    }

    function validateAndSubmit() {
        let entries = [];
        for(let i=0; i<employees.length; i++) {
            let tot = document.getElementById(`tot-${i}`).innerText;
            if(Number(tot) > 0) {
                let hourly = [];
                document.querySelectorAll(`.in-${i}`).forEach(inp => hourly.push(inp.value));
                entries.push({
                    date: document.querySelector(`.date-${i}`).value,
                    name: employees[i].name, id: employees[i].id, spec: employees[i].spec, mgr: employees[i].mgr,
                    h: hourly, total: tot, avg: document.getElementById(`avg-${i}`).innerText
                });
            }
        }
        if(entries.length === 0) return alert("No data to submit.");
        database = [...database, ...entries];
        alert("✅ Data Submitted Successfully!");
        renderTable();
    }

    function openStore() {
        const cont = document.getElementById('storeContent');
        if(database.length === 0) {
            cont.innerHTML = "<p style='text-align:center; padding:50px;'>No data archived yet.</p>";
        } else {
            let h = `<table class="stored-table"><thead><tr>
                <th>DATE</th><th>NAME</th><th>ID</th><th>SPEC</th><th>MGR</th>
                <th>8-9</th><th>9-10</th><th>10-11</th><th>11-12</th><th>1-2</th><th>2-3</th><th>3-4</th><th>4-5</th><th>5-6</th>
                <th>TOTAL</th><th>AVG</th>
            </tr></thead><tbody>`;
            database.forEach(d => {
                h += `<tr><td>${d.date}</td><td>${d.name}</td><td>${d.id}</td><td>${d.spec}</td><td>${d.mgr}</td>
                    ${d.h.map(v => `<td>${v}</td>`).join('')}
                    <td style='font-weight:bold'>${d.total}</td><td>${d.avg}</td></tr>`;
            });
            cont.innerHTML = h + "</tbody></table>";
        }
        document.getElementById('storeModal').style.display = 'flex';
    }

    function closeStore() { document.getElementById('storeModal').style.display = 'none'; }
    function resetView() { document.getElementById('inputSection').style.display = 'block'; document.getElementById('targetBlock').style.display = 'none'; }

    function downloadCSV() {
        if(database.length === 0) return;
        let csv = "Date,Name,ID,Spec,Total,Avg\n";
        database.forEach(d => { csv += `${d.date},${d.name},${d.id},${d.spec},${d.total},${d.avg}\n`; });
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Productivity_Export.csv';
        a.click();
    }
</script>
</body>
</html>
